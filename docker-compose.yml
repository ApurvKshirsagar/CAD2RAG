version: '3.9'

services:
  neo4j:
    image: neo4j:5.19
    container_name: dxf_neo4j
    ports:
      - '7474:7474' # Browser UI
      - '7687:7687' # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/your_neo4j_password_here
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

volumes:
  neo4j_data:
  neo4j_logs:
